name: CI

# Validation gate for the develop branch: runs on every push to develop and on
# any pull request targeting develop. The test suite is secret-free — dotenv is
# neutralized in vitest.config.ts and all env is pinned — so no repository
# secrets are needed here.
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, test & build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Production build
        run: npm run build
